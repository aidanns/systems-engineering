name: Systems Engineering CLI
description: Generate systems engineering artefacts from YAML definitions.
functions:
  - name: Input Processing
    description: Load and parse YAML definitions.
    functions:
      - name: Load YAML
        description: Read and parse YAML files from disk.
      - name: Find Subtree
        description: Extract a subtree rooted at a named node.
      - name: Filter Tree
        description: Prune the tree to matching functions and their ancestors, optionally including all descendants of matched nodes.
  - name: Output Generation
    description: Convert parsed data into output formats.
    functions:
      - name: Generate Functional D2
        description: Convert functional decomposition to d2 diagram definition.
      - name: Generate Functional Markdown
        description: Convert functional decomposition to a markdown table.
      - name: Generate Functional CSV
        description: Convert functional decomposition to a CSV table.
      - name: Generate Product D2
        description: Convert product breakdown to d2 diagram definition.
      - name: Generate Product Markdown
        description: Convert product breakdown to a markdown table.
      - name: Generate Product CSV
        description: Convert product breakdown to a CSV table.
  - name: Rendering
    description: Render d2 definitions to visual formats.
    functions:
      - name: Render SVG
        description: Render a d2 definition to SVG via the d2 tool.
      - name: Render PNG
        description: Render a d2 definition to PNG via the d2 tool.
  - name: Verification
    description: Verify consistency between functional and product breakdowns.
    functions:
      - name: Verify Function Allocation
        description: Check all leaf functions are allocated to configuration items.
  - name: CLI Interface
    description: Parse command-line arguments and orchestrate processing.
    functions:
      - name: Argument Parsing
        description: Parse command-line arguments and subcommands.
      - name: File Processing
        description: Orchestrate generation of all output files from a single input or directory.
