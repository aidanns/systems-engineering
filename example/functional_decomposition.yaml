name: Example System
description: An example system demonstrating functional decomposition.
functions:
  - name: Power Management
    description: Manage the generation, storage, and distribution of power.
    functions:
      - name: Generate Power
        description: Convert energy sources into electrical power.
      - name: Store Power
        description: Store electrical power for later use.
      - name: Distribute Power
        description: Route power to subsystems as needed.
  - name: Thermal Management
    description: Monitor and control system temperatures.
    functions:
      - name: Detect Temperature
        description: Measure temperature at key points.
      - name: Cool Components
        description: Actively cool components that exceed thresholds.
  - name: Data Processing
    description: Handle the collection, transformation, and storage of data.
    functions:
      - name: Collect Data
        description: Gather raw data from sensors and inputs.
      - name: Transform Data
        description: Process and normalize collected data.
      - name: Store Data
        description: Persist processed data for retrieval.
