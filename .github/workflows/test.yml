name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Test
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          runCmd: scripts/test.sh
          env: |
            CI=true

      - name: Test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: results.xml
          include_passed: true

      - name: Install integration tests
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          runCmd: scripts/test-install.sh

      - name: Regenerate golden files
        if: failure()
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          runCmd: scripts/regenerate_golden.sh

      - name: Upload regenerated golden files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-files
          path: tests/golden/
          retention-days: 7
